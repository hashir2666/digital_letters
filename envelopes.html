<!DOCTYPE html>
<html>

<head>
  <link rel="icon" type="image/png" href="favicon.png">

<meta property="og:title" content="Digital Letters">
<meta property="og:description" content="A special letter just for you.">
<meta property="og:image" content="favicon.png">
<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">

<style>

body {
  background-image: url("background.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
}

/* Title stays at top */
h1 {
  color: white;
  font-family: 'Dancing Script', cursive;
  font-size: 60px;
  margin-top: 50px;
  margin-bottom: 40px;
  text-shadow: 0px 0px 10px white;
  text-align: center;
}

/* Container centers envelopes in viewport */
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  flex-wrap: wrap;
  gap: 50px;
  min-height: calc(100vh - 160px); /* viewport minus title + margins */
  padding-bottom: 100px; /* space for button */
}

.envelope {
  width: 300px;   /* bigger width */
  height: 400px;  /* bigger height */
  perspective: 1000px;
  cursor: pointer;
}

.card{
width:100%;
height:100%;
position:relative;
transition:0.7s;
transform-style:preserve-3d;
}

.envelope:hover .card{
transform: rotateY(180deg) translateY(-10px);
}

.front, .back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
}

.back{
transform:rotateY(180deg);
}

.envimg {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 10px;
}

.selected{
transform:scale(1.1);
box-shadow:0px 0px 20px white;
border-radius:10px;
}

.nextBtn{
position:fixed;
bottom:30px;
right:30px;
padding:15px 25px;
font-size:18px;
background-color:pink;
border:none;
border-radius:20px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Choose Your Envelope</h1>

<button class="nextBtn">
Lets Write
</button>

<div class="container">

<div class="envelope">
  <div class="card">
    <div class="front"><img src="evn1.png" class="envimg"></div>
    <div class="back"><img src="evn1.png" class="envimg"></div>
  </div>
</div>

<div class="envelope">
  <div class="card">
    <div class="front"><img src="evn2.png" class="envimg"></div>
    <div class="back"><img src="evn2.png" class="envimg"></div>
  </div>
</div>

<div class="envelope">
  <div class="card">
    <div class="front"><img src="evn3.png" class="envimg"></div>
    <div class="back"><img src="evn3.png" class="envimg"></div>
  </div>
</div>

<div class="envelope">
  <div class="card">
    <div class="front"><img src="evn4.png" class="envimg"></div>
    <div class="back"><img src="evn4.png" class="envimg"></div>
  </div>
</div>

</div>
<script>
  // Step 3 — Save selected envelope
  const envelopes = document.querySelectorAll(".envelope");

  envelopes.forEach(function(env, index) {
    env.addEventListener("click", function() {
      // Remove highlight from all envelopes
      envelopes.forEach(e => e.classList.remove("selected"));
      // Highlight the clicked one
      env.classList.add("selected");

      // Save selected envelope number (1,2,3,4)
      localStorage.setItem("selectedEnvelope", index + 1);
    });
  });
</script>



<script>
  document.addEventListener("DOMContentLoaded", function() {
    const nextBtn = document.querySelector(".nextBtn");

    nextBtn.addEventListener("click", function() {
      // Check if envelope is selected
      const selectedEnvelope = localStorage.getItem("selectedEnvelope");
      if (!selectedEnvelope) {
        alert("Please select an envelope first!");
        return;
      }

      // Navigate to write.html
      window.location.href = "write.html";
    });
  });
</script>

</body>
</html>
