<!DOCTYPE html>
<html>

<head>

  <link rel="icon" type="image/png" href="favicon.png">

<meta property="og:title" content="Digital Letters">
<meta property="og:description" content="A special letter just for you.">
<meta property="og:image" content="favicon.png">
<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="favicon.png">
<title>Express Yourself</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">

<style>

 
  body{
    margin:0;
    font-family:Arial;
  }

  body{
  margin:0;
  font-family:Arial;
  background-image: url("pic.jpg");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}
  .title{
    text-align:center;
    margin-top:30px;
    font-family:'Dancing Script', cursive;
    font-size:60px;
    color:white;
    text-shadow:0px 0px 15px rgba(255, 182, 193, 0.8);
  }

  .paperContainer{
    position:relative;
    width:550px;
    margin:40px auto;
  }

  .paperContainer img{
    width:100%;
    border-radius:20px;
    box-shadow:0px 0px 25px rgba(0,0,0,0.3);
  }

  textarea{
    position:absolute;
    top:72px;
    left:55px;
    width:430px;
    height:340px;
    background:transparent;
    border:none;
    outline:none;
    resize:none;
    font-size:20px;
    font-family:'Dancing Script', cursive;
    color:#9a7d65;
    line-height:38px;
    padding:0;
    margin:0;
    z-index:2;
  }

  #guideText{
    position:absolute;
    top:72px;
    left:55px;
    width:430px;
    height:340px;
    font-size:20px;
    font-family:'Dancing Script', cursive;
    color:#c4a898;
    line-height:38px;
    pointer-events:none;
    z-index:1;
  }

  .sendBtn{
    display:block;
    margin:20px auto;
    padding:15px 40px;
    font-size:20px;
    background:pink;
    border:none;
    border-radius:25px;
    cursor:pointer;
  }

</style>

</head>


<body>



<div class="title">
  Express Yourself
</div>

<div class="paperContainer">

  <img src="images/template.png">

  <!-- GUIDE TEXT sits behind textarea -->
  <div id="guideText">
    To My Beloved,<br><br>
    Every petal carries a piece of my heart...<br><br>
    <br><br><br><br>
    Forever Yours,
  </div>

  <!-- TEXTAREA sits on top -->
  <textarea id="letterInput" oninput="hidePlaceholder()" onfocus="hidePlaceholder()"></textarea>

</div>

<button class="sendBtn" onclick="saveLetter()">Send with Love ♥</button>

<script>
  function hidePlaceholder(){
    document.getElementById('guideText').style.display = 'none';
  }

  function saveLetter(){
    const text = document.getElementById("letterInput").value;
    localStorage.setItem("letterText", text);
    window.location.href = "sent.html";
  }
</script>

</body>

</html>
